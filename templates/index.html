<!DOCTYPE html>
<html>
<head>
    <title>AI Chat App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🤖 AI Assistant</h1>

    <form method="POST">
        <textarea name="prompt" placeholder="Ask something..."></textarea>
        <br>
        <button type="submit">Generate</button>
    </form>

    {% if response %}
    <div class="response-box">
        <p>{{ response }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
